<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Your Moviroo Password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%);
    }
    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(124,58,237,0.12);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 460px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, #7C3AED 0%, #5B21B6 100%);
    }
    .logo-container { text-align: center; margin-bottom: 32px; }
    .logo { width: 160px; height: auto; max-width: 100%; }
    h2 {
      color: #1F2937;
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 10px;
      text-align: center;
    }
    p {
      color: #6B7280;
      font-size: 15px;
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    input[type=password] {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #E5E7EB;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: all .3s ease;
      font-family: inherit;
    }
    input[type=password]:focus {
      border-color: #7C3AED;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #7C3AED 0%, #6D28D9 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all .3s ease;
      margin-top: 8px;
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.4);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
    }
    button:active { transform: translateY(0); }
    button:disabled {
      background: linear-gradient(135deg, #A78BFA 0%, #C4B5FD 100%);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .msg {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      animation: slideIn 0.3s ease;
    }
    .msg.error {
      background: #FEE2E2;
      color: #B91C1C;
      border-left: 4px solid #DC2626;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      .card { padding: 36px 24px 28px; }
      .logo { width: 140px; }
      h2    { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-container">
      <img class="logo"
           src="https://res.cloudinary.com/dox9rfabz/image/upload/v1774816416/ls2-removebg-preview_azlsfa.png"
           alt="Moviroo Logo" />
    </div>
    <h2>Reset Your Password</h2>
    <p>Enter your new password below. This link expires in <strong>30 minutes</strong>.</p>
    <form id="form">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="Minimum 6 characters" required minlength="6" />
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat your password" required />
      </div>
      <button type="submit" id="btn">Reset Password</button>
      <div class="msg error" id="errMsg"></div>
    </form>
  </div>

  <script>
    var token = new URLSearchParams(window.location.search).get('token') || '';

    document.getElementById('form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var pw  = document.getElementById('password').value;
      var pw2 = document.getElementById('confirm').value;
      var err = document.getElementById('errMsg');
      var btn = document.getElementById('btn');

      err.style.display = 'none';

      if (pw !== pw2) {
        err.textContent   = 'Passwords do not match.';
        err.style.display = 'block';
        return;
      }
      if (pw.length < 6) {
        err.textContent   = 'Password must be at least 6 characters long.';
        err.style.display = 'block';
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Resetting...';

      try {
        var res  = await fetch('/api/auth/reset-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token: token, newPassword: pw }),
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Reset failed. The link may have expired.');

        // Redirect to success page (keep token in URL for reference)
        window.location.href = '/api/auth/reset-password/success';

      } catch (ex) {
        err.textContent   = ex.message;
        err.style.display = 'block';
        btn.disabled      = false;
        btn.textContent   = 'Reset Password';
      }
    });
  </script>
</body>
</html>
