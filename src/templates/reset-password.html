<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Your Moviroo Password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%);
    }
    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(124,58,237,0.12);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 460px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, #7C3AED 0%, #5B21B6 100%);
    }
    .logo-container { text-align: center; margin-bottom: 28px; }
    .logo { width: 280px; height: auto; max-width: 100%; }
    h2 {
      color: #1F2937;
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      color: #6B7280;
      font-size: 15px;
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .security-card {
      background: #F5F3FF;
      border: 1px solid #DDD6FE;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
    }
    .security-card h3 {
      font-size: 13px;
      font-weight: 700;
      color: #5B21B6;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .security-card ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .security-card li {
      font-size: 13px;
      color: #4C1D95;
      line-height: 1.8;
      padding-left: 20px;
      position: relative;
    }
    .security-card li::before {
      content: '•';
      position: absolute;
      left: 6px;
      color: #7C3AED;
      font-weight: 700;
    }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    input[type=password] {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #E5E7EB;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: all .3s ease;
      font-family: inherit;
    }
    input[type=password]:focus {
      border-color: #7C3AED;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }
    .strength-bar {
      height: 4px;
      background: #E5E7EB;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0;
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .strength-fill.weak { width: 33%; background: #EF4444; }
    .strength-fill.medium { width: 66%; background: #F59E0B; }
    .strength-fill.strong { width: 100%; background: #10B981; }
    .strength-label {
      font-size: 11px;
      font-weight: 600;
      margin-top: 4px;
      text-align: right;
    }
    .strength-label.weak { color: #EF4444; }
    .strength-label.medium { color: #F59E0B; }
    .strength-label.strong { color: #10B981; }
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #7C3AED 0%, #6D28D9 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all .3s ease;
      margin-top: 8px;
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.4);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
    }
    button:active { transform: translateY(0); }
    button:disabled {
      background: linear-gradient(135deg, #A78BFA 0%, #C4B5FD 100%);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .msg {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      animation: slideIn 0.3s ease;
    }
    .msg.error {
      background: #FEE2E2;
      color: #B91C1C;
      border-left: 4px solid #DC2626;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      .card { padding: 36px 24px 28px; }
      .logo { width: 270px; }
      h2    { font-size: 22px; }
      .security-card { padding: 14px 16px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-container">
      <img class="logo"
           src="https://res.cloudinary.com/dox9rfabz/image/upload/v1778712358/moviroo_light_dark_big_xormqg.png"
           alt="Moviroo Logo" />
    </div>
    <h2>Reset Your Password</h2>
    <p class="subtitle">Enter your new password below. This link expires in <strong>30 minutes</strong>.</p>

    <!-- Password Requirements -->
    

    <form id="form">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="Create a strong password" required />
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat your password" required />
      </div>

      <div class="security-card">
      <h3>Your password must include:</h3>
      <ul>
        <li>At least 8 characters</li>
        <li>One uppercase letter</li>
        <li>One lowercase letter</li>
        <li>One number</li>
        <li>One special character</li>
      </ul>
    </div>

      <button type="submit" id="btn">Reset Password</button>
      <div class="msg error" id="errMsg"></div>
    </form>
  </div>

  <script>
    var token = new URLSearchParams(window.location.search).get('token') || '';

    function checkStrength(pw) {
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[a-z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      return score;
    }

    function updateStrength(pw) {
      var fill = document.getElementById('strengthFill');
      var label = document.getElementById('strengthLabel');
      var score = checkStrength(pw);
      fill.className = 'strength-fill';
      label.className = 'strength-label';
      if (pw.length === 0) {
        label.textContent = '';
        return;
      }
      if (score <= 2) {
        fill.classList.add('weak');
        label.classList.add('weak');
        label.textContent = 'Weak';
      } else if (score <= 4) {
        fill.classList.add('medium');
        label.classList.add('medium');
        label.textContent = 'Medium';
      } else {
        fill.classList.add('strong');
        label.classList.add('strong');
        label.textContent = 'Strong';
      }
    }

    document.getElementById('password').addEventListener('input', function(e) {
      updateStrength(e.target.value);
    });

    document.getElementById('form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var pw  = document.getElementById('password').value;
      var pw2 = document.getElementById('confirm').value;
      var err = document.getElementById('errMsg');
      var btn = document.getElementById('btn');

      err.style.display = 'none';

      if (pw !== pw2) {
        err.textContent   = 'Passwords do not match.';
        err.style.display = 'block';
        return;
      }
      if (pw.length < 8) {
        err.textContent   = 'Password must be at least 8 characters long.';
        err.style.display = 'block';
        return;
      }
      if (!/[A-Z]/.test(pw)) {
        err.textContent   = 'Password must contain at least one uppercase letter.';
        err.style.display = 'block';
        return;
      }
      if (!/[a-z]/.test(pw)) {
        err.textContent   = 'Password must contain at least one lowercase letter.';
        err.style.display = 'block';
        return;
      }
      if (!/[0-9]/.test(pw)) {
        err.textContent   = 'Password must contain at least one number.';
        err.style.display = 'block';
        return;
      }
      if (!/[^A-Za-z0-9]/.test(pw)) {
        err.textContent   = 'Password must contain at least one special character.';
        err.style.display = 'block';
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Resetting...';

      try {
        var res  = await fetch('/api/auth/reset-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token: token, newPassword: pw }),
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Reset failed. The link may have expired.');

        window.location.href = '/api/auth/reset-password/success';

      } catch (ex) {
        err.textContent   = ex.message;
        err.style.display = 'block';
        btn.disabled      = false;
        btn.textContent   = 'Reset Password';
      }
    });
  </script>
</body>
</html>
