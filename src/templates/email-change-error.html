<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Link Invalid – Moviroo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: #fff; border-radius: 24px;
      box-shadow: 0 20px 60px rgba(124,58,237,0.12);
      padding: 56px 48px 48px; width: 100%; max-width: 460px;
      text-align: center; position: relative; overflow: hidden;
      animation: fadeUp 0.5s ease;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 5px; background: linear-gradient(90deg, #7C3AED 0%, #5B21B6 100%);
    }
    .logo-container { margin-bottom: 28px; }
    .logo { width: 140px; height: auto; max-width: 100%; }
    .error-icon {
      width: 80px; height: 80px; margin: 0 auto 24px;
      background: linear-gradient(135deg, #EF4444 0%, #B91C1C 100%);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      animation: scaleIn 0.5s ease; box-shadow: 0 8px 24px rgba(239,68,68,0.4);
    }
    .error-icon svg { width: 38px; height: 38px; stroke: white; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    h2 { font-size: 26px; font-weight: 800; color: #1F2937; margin-bottom: 12px; }
    p { font-size: 15px; color: #6B7280; line-height: 1.6; margin-bottom: 28px; }
    .divider { border: none; border-top: 1px solid #F3F4F6; margin: 0 0 24px; }
    .footer-note { font-size: 12px; color: #9CA3AF; margin: 0; }
    .footer-note strong { color: #6B7280; }
    @keyframes fadeUp  { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @media (max-width: 480px) { .card { padding: 40px 28px 36px; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-container">
      <img class="logo" src="https://res.cloudinary.com/dox9rfabz/image/upload/v1774816416/ls2-removebg-preview_azlsfa.png" alt="Moviroo Logo"/>
    </div>
    <div class="error-icon">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <h2>Link Expired or Invalid</h2>
    <p>{{ERROR_MESSAGE}}</p>
    <hr class="divider"/>
    <p class="footer-note">&copy; {{YEAR}} <strong>Moviroo</strong>. All rights reserved.</p>
  </div>
</body>
</html>
