<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email Updated – Moviroo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 24px; box-shadow: 0 20px 60px rgba(124,58,237,0.12); padding: 56px 48px 48px; width: 100%; max-width: 460px; text-align: center; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #7C3AED 0%, #5B21B6 100%); }
    .logo { width: 130px; height: auto; margin: 0 auto 32px; display: block; }
    .icon-wrap { width: 80px; height: 80px; background: linear-gradient(135deg, #22C55E 0%, #22C55E 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; }
    .icon-wrap svg { width: 38px; height: 38px; stroke: #fff; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    h1 { font-size: 24px; font-weight: 800; color: #111827; margin: 0 0 12px; }
    .subtitle { font-size: 15px; color: #6B7280; line-height: 1.7; margin: 0 0 12px; }
    .new-email { display: inline-block; background: #F5F3FF; color: #7C3AED; font-weight: 700; font-size: 14px; padding: 8px 20px; border-radius: 999px; border: 1.5px solid #DDD6FE; margin: 0 0 32px; word-break: break-all; }
    .divider { border: none; border-top: 1px solid #F3F4F6; margin: 0 0 28px; }
    .info { background: #F0FDF4; border-left: 4px solid #22C55E; border-radius: 8px; padding: 14px 16px; text-align: left; margin-bottom: 32px; }
    .info p { font-size: 13px; color: #166534; line-height: 1.6; margin: 0; }
    .footer-note { font-size: 12px; color: #9CA3AF; }
    .footer-note strong { color: #6B7280; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="https://res.cloudinary.com/dox9rfabz/image/upload/v1774816416/ls2-removebg-preview_azlsfa.png" alt="Moviroo"/>
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Email Updated!</h1>
    <p class="subtitle">Your email address has been successfully changed to:</p>
    <span class="new-email">{{NEW_EMAIL}}</span>
    <hr class="divider"/>
    <div class="info">
      <p>You can now log in using your new email address. If you did not make this change, please contact support immediately.</p>
    </div>
    <p class="footer-note">&copy; {{YEAR}} <strong>Moviroo</strong>. All rights reserved.</p>
  </div>
</body>
</html>
