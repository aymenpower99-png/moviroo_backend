<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Link Invalid – Moviroo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); padding: 48px 40px 40px; width: 100%; max-width: 440px; position: relative; overflow: hidden; text-align: center; animation: fadeUp 0.5s ease; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #EF4444 0%, #B91C1C 100%); }
    .error-icon { width: 80px; height: 80px; margin: 0 auto 24px; background: linear-gradient(135deg, #EF4444 0%, #B91C1C 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: scaleIn 0.5s ease; box-shadow: 0 8px 24px rgba(239,68,68,0.4); }
    .error-icon svg { width: 38px; height: 38px; stroke: white; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    h2 { font-size: 26px; font-weight: 700; color: #1F2937; margin-bottom: 12px; }
    p { font-size: 15px; color: #6B7280; line-height: 1.6; margin-bottom: 28px; }
    .footer-note { font-size: 12px; color: #9CA3AF; margin: 0; }
    .footer-note strong { color: #6B7280; }
    @keyframes fadeUp  { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @media (max-width: 480px) { .card { padding: 36px 28px 28px; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="error-icon">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <h2>Link Expired or Invalid</h2>
    <p>{{ERROR_MESSAGE}}</p>
    <p class="footer-note">&copy; {{YEAR}} <strong>Moviroo</strong>. All rights reserved.</p>
  </div>
</body>
</html>
